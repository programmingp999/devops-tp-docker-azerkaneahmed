name: Build, Scan and Push Docker Image
on:
  push:
    branches: [ main ]
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  # On force en minuscules pour éviter l'erreur de format
  IMAGE_NAME: programmingp999/devops-tp-docker-azerkaneahmed

jobs:
  security-analysis:
    name: Security Analysis (Hadolint)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ./Dockerfile
          failure-threshold: warning

  build-and-scan:
    name: Build and Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: security-analysis
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: devops-scan:test
      - name: Run Trivy scanner (SARIF)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: devops-scan:test
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
      - name: Upload results to GitHub
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
      - name: Security Gate
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: devops-scan:test
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL'

  push-image:
    name: Push Docker Image
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}